version: 2

project_name: hardpoint-agent

before:
  hooks:
    - go mod tidy

builds:
  - goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -X github.com/hardpointlabs/agent/config.Version={{ .Version }}
      - -X github.com/hardpointlabs/agent/config.Commit={{ .Commit }}

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

brews:
  - name: hardpoint-agent
    commit_author:
      name: Chris Mowforth
      email: chris.mowforth@hardpoint.dev
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    directory: Formula
    description: "Hardpoint agent"
    install: |
      bin.install "hardpoint-agent"
    test: |
      system "#{bin}/hardpoint-agent --version"
    repository:
      owner: hardpointlabs
      name: homebrew-agent
      branch: master
      token: "{{ .Env.GITHUB_TOKEN }}"
